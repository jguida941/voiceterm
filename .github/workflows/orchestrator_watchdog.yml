# Purpose: Checks multi-agent orchestrator status and stale-lane SLA rules.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: Orchestrator Watchdog

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  watchdog:
    if: ${{ vars.ORCHESTRATOR_WATCHDOG_MODE != '' && vars.ORCHESTRATOR_WATCHDOG_MODE != 'off' }}
    name: multi-agent sla watchdog
    runs-on: ubuntu-latest
    env:
      WATCHDOG_MODE: ${{ vars.ORCHESTRATOR_WATCHDOG_MODE }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Run orchestrator status guard
        run: python3 dev/scripts/devctl.py orchestrate-status --format md

      - name: Run orchestrator SLA watchdog
        run: |
          set +e
          python3 dev/scripts/devctl.py orchestrate-watch --stale-minutes 30 --format md
          RC=$?
          set -e
          if [[ "${RC}" -eq 0 ]]; then
            exit 0
          fi
          if [[ "${WATCHDOG_MODE}" == "enforce" ]]; then
            echo "Watchdog enforcement mode active; failing with ${RC}."
            exit "${RC}"
          fi
          echo "::warning::Watchdog reported stale lanes (rc=${RC}); report-only mode keeps this run non-blocking."
          exit 0
