# Purpose: Runs tooling, docs-governance, and process policy gates.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: Tooling Control Plane

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - develop
    paths:
      - "dev/scripts/**"
      - "README.md"
      - "QUICK_START.md"
      - "DEV_INDEX.md"
      - "dev/active/**"
      - "guides/*.md"
      - "dev/README.md"
      - "scripts/README.md"
      - "pypi/README.md"
      - "app/README.md"
      - "img/**"
      - "rust/src/bin/voiceterm/config/cli.rs"
      - "rust/src/config/mod.rs"
      - "dev/config/markdownlint.yaml"
      - "dev/config/markdownlint.ignore"
      - "dev/config/compat/**"
      - "scripts/macro-packs/**"
      - "Makefile"
      - "AGENTS.md"
      - "dev/DEVELOPMENT.md"
      - "dev/scripts/README.md"
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - "dev/scripts/**"
      - "README.md"
      - "QUICK_START.md"
      - "DEV_INDEX.md"
      - "dev/active/**"
      - "guides/*.md"
      - "dev/README.md"
      - "scripts/README.md"
      - "pypi/README.md"
      - "app/README.md"
      - "img/**"
      - "rust/src/bin/voiceterm/config/cli.rs"
      - "rust/src/config/mod.rs"
      - "dev/config/markdownlint.yaml"
      - "dev/config/markdownlint.ignore"
      - "dev/config/compat/**"
      - "scripts/macro-packs/**"
      - "Makefile"
      - "AGENTS.md"
      - "dev/DEVELOPMENT.md"
      - "dev/scripts/README.md"
      - ".github/workflows/*.yml"

jobs:
  devctl-tests:
    name: devctl unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Run devctl tests
        run: python3 -m unittest discover -s dev/scripts/devctl/tests -p "test_*.py"

      - name: Smoke devctl ship/pypi/list commands
        run: |
          set -euo pipefail
          VERSION="$(python3 dev/scripts/checks/check_release_version_parity.py --print-version)"
          python3 dev/scripts/devctl.py list --format md
          python3 dev/scripts/devctl.py audit-scaffold --dry-run --force --yes --format md
          python3 dev/scripts/devctl.py pypi --dry-run
          python3 dev/scripts/devctl.py homebrew --version "${VERSION}" --dry-run
          python3 dev/scripts/devctl.py ship --version "${VERSION}" --notes --dry-run --format json
          python3 dev/scripts/devctl.py ship --version "${VERSION}" --pypi --verify-pypi --dry-run --format json
          python3 dev/scripts/devctl.py ship --version "${VERSION}" --homebrew --dry-run --format json

  shell-integrity:
    name: shell script integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: bash -n maintainer scripts
        run: |
          set -euo pipefail
          bash -n dev/scripts/*.sh
          bash -n scripts/*.sh

  docs-policy:
    name: docs policy + governance guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.45.0

      - name: Resolve commit range and changed files
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python3 dev/scripts/workflow_shell_bridge.py resolve-range \
            --event-name "${EVENT_NAME}" \
            --push-before "${PUSH_BEFORE}" \
            --push-head "${PUSH_HEAD}" \
            --pr-base "${PR_BASE}" \
            --pr-head "${PR_HEAD}" \
            --changed-files-output /tmp/docs-policy-changed-files.txt \
            --github-output "${GITHUB_OUTPUT}"
          echo "Changed files:"
          cat /tmp/docs-policy-changed-files.txt

      - name: Evaluate strict user-doc gate signal
        id: docs_signal
        run: |
          set -euo pipefail
          python3 dev/scripts/workflow_shell_bridge.py evaluate-user-docs-gate \
            --changed-files-input /tmp/docs-policy-changed-files.txt \
            --github-output "${GITHUB_OUTPUT}"

      - name: Run docs-check strict-tooling gate
        run: |
          set -euo pipefail
          python3 dev/scripts/devctl.py docs-check \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}" \
            --strict-tooling --format md

      - name: Run docs-check user-facing strict gate (conditional)
        run: |
          set -euo pipefail
          if [[ "${{ steps.docs_signal.outputs.run_user_facing_strict }}" == "true" ]]; then
            echo "Running strict user-facing docs-check gate."
            python3 dev/scripts/devctl.py docs-check \
              --since-ref "${{ steps.range.outputs.since }}" \
              --head-ref "${{ steps.range.outputs.head }}" \
              --user-facing --strict --format md
          else
            echo "Skipping strict user-facing docs-check gate (no broad user-facing/CLI schema signal)."
          fi

      - name: Run governance hygiene gate
        run: python3 dev/scripts/devctl.py hygiene --strict-warnings --format md

      - name: Run AGENTS contract guard
        run: python3 dev/scripts/checks/check_agents_contract.py

      - name: Run active-plan sync guard
        run: python3 dev/scripts/checks/check_active_plan_sync.py

      - name: Run multi-agent sync guard
        run: python3 dev/scripts/checks/check_multi_agent_sync.py

      - name: Run orchestrator status guard
        run: python3 dev/scripts/devctl.py orchestrate-status --format md

      - name: Run orchestrator SLA watchdog
        run: python3 dev/scripts/devctl.py orchestrate-watch --stale-minutes 120 --format md

      - name: Run release version parity guard
        run: python3 dev/scripts/checks/check_release_version_parity.py

      - name: Run CLI flags parity guard
        run: python3 dev/scripts/checks/check_cli_flags_parity.py

      - name: Run screenshot integrity guard
        run: python3 dev/scripts/checks/check_screenshot_integrity.py --stale-days 120

      - name: Run code-shape guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_code_shape.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run workflow shell hygiene guard
        run: python3 dev/scripts/checks/check_workflow_shell_hygiene.py

      - name: Run workflow action pinning guard
        run: python3 dev/scripts/checks/check_workflow_action_pinning.py

      - name: Run bundle/workflow parity guard
        run: python3 dev/scripts/checks/check_bundle_workflow_parity.py

      - name: Run IDE/provider isolation guard
        run: python3 dev/scripts/checks/check_ide_provider_isolation.py --fail-on-violations

      - name: Run compatibility matrix schema guard
        run: python3 dev/scripts/checks/check_compat_matrix.py

      - name: Run compatibility matrix runtime smoke guard
        run: python3 dev/scripts/checks/compat_matrix_smoke.py

      - name: Run naming consistency guard
        run: python3 dev/scripts/checks/check_naming_consistency.py

      - name: Run rust test-shape non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_test_shape.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run rust lint-debt non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_lint_debt.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run rust best-practices non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_best_practices.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run rust runtime panic-policy non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_runtime_panic_policy.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Guard root-level accidental CLI artifact files
        run: |
          set -euo pipefail
          ARTIFACTS="$(find . -maxdepth 1 -type f -name '--*' -print)"
          if [[ -n "${ARTIFACTS}" ]]; then
            echo "Unexpected root-level CLI artifact files detected:"
            echo "${ARTIFACTS}"
            echo "Remove these files before merging."
            exit 1
          fi

      - name: Lint key docs
        run: |
          set -euo pipefail
          markdownlint -c dev/config/markdownlint.yaml -p dev/config/markdownlint.ignore \
            README.md \
            QUICK_START.md \
            DEV_INDEX.md \
            guides/*.md \
            dev/README.md \
            scripts/README.md \
            pypi/README.md \
            app/README.md

      - name: Generate remediation audit scaffold on failure
        if: ${{ failure() }}
        run: |
          set -euo pipefail
          python3 dev/scripts/devctl.py audit-scaffold \
            --source-guards \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}" \
            --force \
            --yes \
            --trigger "tooling-control-plane/docs-policy" \
            --format md

      - name: Upload remediation audit scaffold artifact on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tooling-control-plane-rust-audit-scaffold
          path: dev/active/RUST_AUDIT_FINDINGS.md
          if-no-files-found: warn
