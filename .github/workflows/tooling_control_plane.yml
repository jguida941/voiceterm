# Purpose: Runs tooling, docs-governance, and process policy gates.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: Tooling Control Plane

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - develop
    paths:
      - "dev/scripts/**"
      - "app/**"
      - "README.md"
      - "QUICK_START.md"
      - "DEV_INDEX.md"
      - "dev/active/**"
      - "guides/*.md"
      - "dev/README.md"
      - "scripts/README.md"
      - "pypi/README.md"
      - "app/README.md"
      - "img/**"
      - "rust/src/bin/voiceterm/config/cli.rs"
      - "rust/src/config/mod.rs"
      - "dev/config/markdownlint.yaml"
      - "dev/config/markdownlint.ignore"
      - "dev/config/compat/**"
      - "dev/config/publication_sync_registry.json"
      - "scripts/macro-packs/**"
      - "scripts/operator_console.sh"
      - "Makefile"
      - "AGENTS.md"
      - "dev/ARCHITECTURE.md"
      - "dev/DEVELOPMENT.md"
      - "dev/DEVCTL_AUTOGUIDE.md"
      - "dev/MCP_DEVCTL_ALIGNMENT.md"
      - "dev/guides/*.md"
      - "dev/scripts/README.md"
      - ".github/workflows/*.yml"
      - "mypy.ini"
  pull_request:
    paths:
      - "dev/scripts/**"
      - "app/**"
      - "README.md"
      - "QUICK_START.md"
      - "DEV_INDEX.md"
      - "dev/active/**"
      - "guides/*.md"
      - "dev/README.md"
      - "scripts/README.md"
      - "pypi/README.md"
      - "app/README.md"
      - "img/**"
      - "rust/src/bin/voiceterm/config/cli.rs"
      - "rust/src/config/mod.rs"
      - "dev/config/markdownlint.yaml"
      - "dev/config/markdownlint.ignore"
      - "dev/config/compat/**"
      - "dev/config/publication_sync_registry.json"
      - "scripts/macro-packs/**"
      - "scripts/operator_console.sh"
      - "Makefile"
      - "AGENTS.md"
      - "dev/ARCHITECTURE.md"
      - "dev/DEVELOPMENT.md"
      - "dev/DEVCTL_AUTOGUIDE.md"
      - "dev/MCP_DEVCTL_ALIGNMENT.md"
      - "dev/guides/*.md"
      - "dev/scripts/README.md"
      - ".github/workflows/*.yml"
      - "mypy.ini"

jobs:
  devctl-tests:
    name: devctl unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python3 -m pip install --quiet pytest-cov

      - name: Run devctl tests with coverage
        run: |
          set -euo pipefail
          python3 -m pytest dev/scripts/devctl/tests/ -q --tb=short \
            --junitxml=devctl-tests.junit.xml \
            --cov=dev/scripts/devctl \
            --cov=dev/scripts/checks \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage-devctl.xml \
            --cov-fail-under=40 \
            2>&1 | tee devctl-tests.pytest.log

      - name: Print devctl coverage summary
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ -f coverage-devctl.xml ]; then
            echo "Coverage XML generated: coverage-devctl.xml"
            python3 dev/scripts/workflow_bridge/shell.py print-coverage-summary \
              --coverage-xml coverage-devctl.xml \
              --label "Devctl"
          else
            echo "No coverage XML found."
          fi

      - name: Upload devctl coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-devctl
          path: |
            coverage-devctl.xml
            devctl-tests.junit.xml
            devctl-tests.pytest.log
          if-no-files-found: warn

  operator-console-tests:
    name: operator console unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install --quiet PyQt6 pytest-cov

      - name: Run operator console tests with coverage
        run: |
          set -euo pipefail
          python3 -m pytest app/operator_console/tests/ -q --tb=short \
            --junitxml=operator-console-tests.junit.xml \
            --cov=app/operator_console \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage-operator-console.xml \
            --cov-fail-under=40 \
            2>&1 | tee operator-console-tests.pytest.log

      - name: Print operator console coverage summary
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ -f coverage-operator-console.xml ]; then
            echo "Coverage XML generated: coverage-operator-console.xml"
            python3 dev/scripts/workflow_bridge/shell.py print-coverage-summary \
              --coverage-xml coverage-operator-console.xml \
              --label "Operator console"
          else
            echo "No coverage XML found."
          fi

      - name: Upload operator console coverage artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-operator-console
          path: |
            coverage-operator-console.xml
            operator-console-tests.junit.xml
            operator-console-tests.pytest.log
          if-no-files-found: warn

      - name: Smoke devctl ship/pypi/list commands
        run: |
          set -euo pipefail
          VERSION="$(python3 dev/scripts/checks/check_release_version_parity.py --print-version)"
          python3 dev/scripts/devctl.py list --format md
          python3 dev/scripts/devctl.py render-surfaces --format md
          python3 dev/scripts/devctl.py audit-scaffold --dry-run --force --yes --format md
          python3 dev/scripts/devctl.py pypi --dry-run
          python3 dev/scripts/devctl.py homebrew --version "${VERSION}" --dry-run
          python3 dev/scripts/devctl.py ship --version "${VERSION}" --notes --dry-run --format json
          python3 dev/scripts/devctl.py ship --version "${VERSION}" --pypi --verify-pypi --dry-run --format json
          python3 dev/scripts/devctl.py ship --version "${VERSION}" --homebrew --dry-run --format json

  shell-integrity:
    name: shell script integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: bash -n maintainer scripts
        run: |
          set -euo pipefail
          bash -n dev/scripts/*.sh
          bash -n scripts/*.sh

  # Mypy type-check (non-blocking). Ratchet plan:
  #   Phase 1 (current) - continue-on-error, lenient defaults, track error count.
  #   Phase 2           - Enable check_untyped_defs, fix violations.
  #   Phase 3           - Enable disallow_untyped_defs for new modules.
  #   Phase 4           - Remove continue-on-error to make blocking.
  python-typecheck:
    name: mypy type check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install mypy
        run: python3 -m pip install --quiet mypy

      - name: Run mypy on devctl tooling
        run: |
          set -euo pipefail
          echo "::group::mypy dev/scripts/devctl"
          python3 -m mypy dev/scripts/devctl/ \
            --config-file mypy.ini \
            --no-error-summary 2>&1 | tee /tmp/mypy-devctl.log || true
          DEVCTL_ERRORS=$(grep -c '^dev/scripts/devctl/.*: error:' /tmp/mypy-devctl.log || true)
          echo "::endgroup::"
          echo "devctl mypy errors: ${DEVCTL_ERRORS}"
          echo "DEVCTL_ERRORS=${DEVCTL_ERRORS}" >> "${GITHUB_ENV}"

      - name: Run mypy on operator console
        run: |
          set -euo pipefail
          echo "::group::mypy app/operator_console"
          python3 -m mypy app/operator_console/ \
            --config-file mypy.ini \
            --no-error-summary 2>&1 | tee /tmp/mypy-console.log || true
          CONSOLE_ERRORS=$(grep -c '^app/operator_console/.*: error:' /tmp/mypy-console.log || true)
          echo "::endgroup::"
          echo "operator_console mypy errors: ${CONSOLE_ERRORS}"
          echo "CONSOLE_ERRORS=${CONSOLE_ERRORS}" >> "${GITHUB_ENV}"

      - name: Summarize mypy error counts
        if: ${{ always() }}
        run: |
          set -euo pipefail
          TOTAL=$(( ${DEVCTL_ERRORS:-0} + ${CONSOLE_ERRORS:-0} ))
          echo "## Mypy Type-Check Summary (advisory)" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Scope | Errors |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|---|---|" >> "${GITHUB_STEP_SUMMARY}"
          echo "| \`dev/scripts/devctl/\` | ${DEVCTL_ERRORS:-0} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| \`app/operator_console/\` | ${CONSOLE_ERRORS:-0} |" >> "${GITHUB_STEP_SUMMARY}"
          echo "| **Total** | **${TOTAL}** |" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "This job is non-blocking (continue-on-error). Track error count trend to ratchet toward zero." >> "${GITHUB_STEP_SUMMARY}"
          echo "mypy total errors: ${TOTAL}"

  docs-policy:
    name: docs policy + governance guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.45.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Install ALSA development headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Resolve commit range and changed files
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python3 dev/scripts/workflow_bridge/shell.py resolve-range \
            --event-name "${EVENT_NAME}" \
            --push-before "${PUSH_BEFORE}" \
            --push-head "${PUSH_HEAD}" \
            --pr-base "${PR_BASE}" \
            --pr-head "${PR_HEAD}" \
            --changed-files-output /tmp/docs-policy-changed-files.txt \
            --github-output "${GITHUB_OUTPUT}"
          echo "Changed files:"
          cat /tmp/docs-policy-changed-files.txt

      - name: Evaluate strict user-doc gate signal
        id: docs_signal
        run: |
          set -euo pipefail
          python3 dev/scripts/workflow_bridge/shell.py evaluate-user-docs-gate \
            --changed-files-input /tmp/docs-policy-changed-files.txt \
            --github-output "${GITHUB_OUTPUT}"

      - name: Run docs-check strict-tooling gate
        run: |
          set -euo pipefail
          python3 dev/scripts/devctl.py docs-check \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}" \
            --strict-tooling --format md

      - name: Run docs-check user-facing strict gate (conditional)
        run: |
          set -euo pipefail
          if [[ "${{ steps.docs_signal.outputs.run_user_facing_strict }}" == "true" ]]; then
            echo "Running strict user-facing docs-check gate."
            python3 dev/scripts/devctl.py docs-check \
              --since-ref "${{ steps.range.outputs.since }}" \
              --head-ref "${{ steps.range.outputs.head }}" \
              --user-facing --strict --format md
          else
            echo "Skipping strict user-facing docs-check gate (no broad user-facing/CLI schema signal)."
          fi

      - name: Run governance hygiene gate
        run: python3 dev/scripts/devctl.py hygiene --strict-warnings --ignore-warning-source mutation_badge --format md

      - name: Run orchestrator status guard
        run: python3 dev/scripts/devctl.py orchestrate-status --format md

      - name: Run orchestrator SLA watchdog
        run: python3 dev/scripts/devctl.py orchestrate-watch --stale-minutes 120 --format md

      - name: Run AGENTS contract guard
        run: python3 dev/scripts/checks/check_agents_contract.py

      - name: Run release version parity guard
        run: python3 dev/scripts/checks/check_release_version_parity.py

      - name: Run repo URL parity guard
        run: python3 dev/scripts/checks/check_repo_url_parity.py

      - name: Run guard-enforcement inventory gate
        run: python3 dev/scripts/checks/check_guard_enforcement_inventory.py

      - name: Run architecture-surface sync guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_architecture_surface_sync.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run guide-contract sync guard
        run: python3 dev/scripts/checks/check_guide_contract_sync.py

      - name: Run instruction-surface sync guard
        run: python3 dev/scripts/checks/check_instruction_surface_sync.py

      - name: Run bundle-registry DRY guard
        run: python3 dev/scripts/checks/check_bundle_registry_dry.py

      - name: Run publication sync guard
        run: python3 dev/scripts/checks/check_publication_sync.py

      - name: Run bundle/workflow parity guard
        run: python3 dev/scripts/checks/check_bundle_workflow_parity.py

      - name: Run platform-layer-boundaries guard
        run: python3 dev/scripts/checks/check_platform_layer_boundaries.py

      - name: Run platform-contract closure guard
        run: python3 dev/scripts/checks/check_platform_contract_closure.py

      - name: Run platform-contract sync guard
        run: python3 dev/scripts/checks/check_platform_contract_sync.py

      - name: Run review-channel bridge guard
        run: python3 dev/scripts/checks/check_review_channel_bridge.py

      - name: Run startup-authority contract guard
        run: python3 dev/scripts/checks/check_startup_authority_contract.py

      - name: Run tandem-consistency guard
        run: python3 dev/scripts/checks/check_tandem_consistency.py

      - name: Run governance-closure guard
        run: python3 dev/scripts/checks/check_governance_closure.py

      - name: Run active-plan sync guard
        run: python3 dev/scripts/checks/check_active_plan_sync.py

      - name: Run multi-agent sync guard
        run: python3 dev/scripts/checks/check_multi_agent_sync.py

      - name: Run CLI flags parity guard
        run: python3 dev/scripts/checks/check_cli_flags_parity.py

      - name: Run screenshot integrity guard
        run: python3 dev/scripts/checks/check_screenshot_integrity.py --stale-days 120

      - name: Run code-shape guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_code_shape.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run package-layout guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_package_layout.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run Python broad-except guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_python_broad_except.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run Python subprocess policy guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_python_subprocess_policy.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run workflow shell hygiene guard
        run: python3 dev/scripts/checks/check_workflow_shell_hygiene.py

      - name: Run workflow action pinning guard
        run: python3 dev/scripts/checks/check_workflow_action_pinning.py

      - name: Run IDE/provider isolation guard
        run: python3 dev/scripts/checks/check_ide_provider_isolation.py --fail-on-violations

      - name: Run compatibility matrix schema guard
        run: python3 dev/scripts/checks/check_compat_matrix.py

      - name: Run compatibility matrix runtime smoke guard
        run: python3 dev/scripts/checks/compat_matrix_smoke.py

      - name: Run naming consistency guard
        run: python3 dev/scripts/checks/check_naming_consistency.py

      - name: Run rust test-shape non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_test_shape.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run rust lint-debt non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_lint_debt.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run rust best-practices non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_best_practices.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run changed-file Rust compiler warning guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_compiler_warnings.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run serde compatibility non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_serde_compatibility.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run rust runtime panic-policy non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_rust_runtime_panic_policy.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run facade-wrappers non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_facade_wrappers.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run god-class non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_god_class.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run mobile-relay protocol non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_mobile_relay_protocol.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run daemon-state parity guard
        run: python3 dev/scripts/checks/check_daemon_state_parity.py

      - name: Run nesting-depth non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_nesting_depth.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run parameter-count non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_parameter_count.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run Python dict-schema non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_python_dict_schema.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run Python global-mutable non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_python_global_mutable.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run Python design-complexity non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_python_design_complexity.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run Python cyclic-imports non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_python_cyclic_imports.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run Python suppression-debt non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_python_suppression_debt.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Run structural-similarity non-regression guard
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_structural_similarity.py \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}"

      - name: Lint key docs
        run: |
          set -euo pipefail
          markdownlint -c dev/config/markdownlint.yaml -p dev/config/markdownlint.ignore \
            README.md \
            QUICK_START.md \
            DEV_INDEX.md \
            guides/*.md \
            dev/README.md \
            scripts/README.md \
            pypi/README.md \
            app/README.md

      - name: Guard root-level accidental CLI artifact files
        run: |
          set -euo pipefail
          ARTIFACTS="$(find . -maxdepth 1 -type f -name '--*' -print)"
          if [[ -n "${ARTIFACTS}" ]]; then
            echo "Unexpected root-level CLI artifact files detected:"
            echo "${ARTIFACTS}"
            echo "Remove these files before merging."
            exit 1
          fi

      - name: Generate remediation audit scaffold on failure
        if: ${{ failure() }}
        run: |
          set -euo pipefail
          python3 dev/scripts/devctl.py audit-scaffold \
            --source-guards \
            --since-ref "${{ steps.range.outputs.since }}" \
            --head-ref "${{ steps.range.outputs.head }}" \
            --force \
            --yes \
            --trigger "tooling-control-plane/docs-policy" \
            --format md

      - name: Upload remediation audit scaffold artifact on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: tooling-control-plane-rust-audit-scaffold
          path: dev/reports/audits/RUST_AUDIT_FINDINGS.md
          if-no-files-found: warn

      - name: Run host process cleanup verify
        if: ${{ always() }}
        run: python3 dev/scripts/devctl.py process-cleanup --verify --format md
