# Purpose: Runs manual release preflight gates before tagging/publishing.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: release_preflight

permissions:
  contents: read
  security-events: read

concurrency:
  group: release-preflight-${{ github.ref }}-${{ github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z)"
        required: true
        type: string

jobs:
  preflight:
    name: release-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Enforce release branch policy
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "master" ]]; then
            echo "release_preflight must run from master (current ref: ${GITHUB_REF_NAME})."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Resolve AI-guard commit range
        id: ai_guard_range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python3 dev/scripts/workflow_shell_bridge.py resolve-range \
            --event-name "${EVENT_NAME}" \
            --push-before "${PUSH_BEFORE}" \
            --push-head "${PUSH_HEAD}" \
            --pr-base "${PR_BASE}" \
            --pr-head "${PR_HEAD}" \
            --changed-files-output /tmp/release-preflight-ai-guard-changed-files.txt \
            --github-output "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.45.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --force

      - name: Install ALSA development headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Validate version format
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: ${RELEASE_VERSION}"
            exit 1
          fi

      - name: Validate release publish secrets
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PYPI_API_TOKEN:-}" ]]; then
            echo "Missing required repository secret: PYPI_API_TOKEN"
            exit 1
          fi
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "Missing required repository secret: HOMEBREW_TAP_TOKEN"
            exit 1
          fi

      - name: Verify release version parity and requested version
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_release_version_parity.py \
            --expected-version "${RELEASE_VERSION}" \
            --format md

      - name: Verify release gates passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 dev/scripts/devctl.py release-gates \
            --branch "master" \
            --sha "${GITHUB_SHA}" \
            --skip-preflight \
            --wait-seconds 1800 \
            --poll-seconds 20 \
            --format md

      - name: Run release runtime bundle
        run: python3 dev/scripts/devctl.py check --profile release

      - name: Run AI guard suite
        run: |
          set -euo pipefail
          python3 dev/scripts/devctl.py check \
            --profile ai-guard \
            --since-ref "${{ steps.ai_guard_range.outputs.since }}" \
            --head-ref "${{ steps.ai_guard_range.outputs.head }}" \
            --skip-fmt \
            --skip-clippy \
            --skip-tests

      - name: Run zizmor workflow security scan
        uses: woodruffw/zizmor-action@e639dbb30f0f5f1b5776b6921e7001715262b4e4

      - name: Run release security gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cargo deny --manifest-path rust/Cargo.toml check advisories bans licenses sources
          python3 dev/scripts/devctl.py security \
            --scanner-tier core \
            --python-scope all \
            --with-codeql-alerts \
            --codeql-repo "${{ github.repository }}" \
            --codeql-min-severity high \
            --format json \
            --output /tmp/release-security.json
          cat /tmp/release-security.json

      - name: Run release governance bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 dev/scripts/devctl.py orchestrate-status --format md
          python3 dev/scripts/devctl.py orchestrate-watch --stale-minutes 120 --format md
          python3 dev/scripts/devctl.py docs-check --strict-tooling
          python3 dev/scripts/devctl.py docs-check --user-facing --strict
          python3 dev/scripts/devctl.py hygiene --strict-warnings
          python3 dev/scripts/checks/check_agents_contract.py
          python3 dev/scripts/checks/check_active_plan_sync.py
          python3 dev/scripts/checks/check_multi_agent_sync.py
          python3 dev/scripts/checks/check_release_version_parity.py
          python3 dev/scripts/checks/check_cli_flags_parity.py
          python3 dev/scripts/checks/check_screenshot_integrity.py --stale-days 120
          python3 dev/scripts/checks/check_code_shape.py
          python3 dev/scripts/checks/check_workflow_shell_hygiene.py
          python3 dev/scripts/checks/check_workflow_action_pinning.py
          python3 dev/scripts/checks/check_bundle_workflow_parity.py
          CI=1 python3 dev/scripts/checks/check_coderabbit_gate.py --branch master
          CI=1 python3 dev/scripts/checks/check_coderabbit_ralph_gate.py --branch master
          python3 dev/scripts/checks/check_ide_provider_isolation.py --fail-on-violations
          python3 dev/scripts/checks/check_compat_matrix.py
          python3 dev/scripts/checks/compat_matrix_smoke.py
          python3 dev/scripts/checks/check_naming_consistency.py
          python3 dev/scripts/checks/check_rust_test_shape.py
          python3 dev/scripts/checks/check_rust_lint_debt.py
          python3 dev/scripts/checks/check_rust_best_practices.py
          python3 dev/scripts/checks/check_rust_runtime_panic_policy.py
          markdownlint -c dev/config/markdownlint.yaml -p dev/config/markdownlint.ignore \
            README.md \
            QUICK_START.md \
            DEV_INDEX.md \
            guides/*.md \
            dev/README.md \
            scripts/README.md \
            pypi/README.md \
            app/README.md
          ARTIFACTS="$(find . -maxdepth 1 -type f -name '--*' -print)"
          if [[ -n "${ARTIFACTS}" ]]; then
            echo "Unexpected root-level CLI artifact files detected:"
            echo "${ARTIFACTS}"
            exit 1
          fi

      - name: Smoke release/distribution command paths
        run: |
          set -euo pipefail
          python3 dev/scripts/devctl.py ship --version "${RELEASE_VERSION}" --notes --dry-run --format md
          python3 dev/scripts/devctl.py ship --version "${RELEASE_VERSION}" --pypi --verify-pypi --dry-run --format md
          python3 dev/scripts/devctl.py ship --version "${RELEASE_VERSION}" --homebrew --dry-run --format md
