name: Release preflight

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
        type: string

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          components: rustfmt, clippy
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev
          python3 -m pip install --upgrade build twine
      - name: Verify version
        run: python3 scripts/release/check_version.py --expected "${{ inputs.version }}"
      - name: Rust quality suite
        run: make ci
      - name: PyPI package
        run: |
          python3 -m build pypi
          python3 -m twine check pypi/dist/*
      - name: Release notes
        run: python3 scripts/release/release_notes.py "${{ inputs.version }}" >/tmp/release-notes.md
