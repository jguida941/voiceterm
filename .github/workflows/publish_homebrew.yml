name: Publish Homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version without the v prefix
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-homebrew-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Resolve and verify version
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_VERSION:-${RELEASE_TAG#v}}"
          TAG="v${VERSION}"
          git fetch origin master --tags
          git merge-base --is-ancestor "${TAG}" origin/master
          python3 scripts/release/check_version.py --expected "${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
      - name: Clone tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: gh repo clone jguida941/homebrew-voiceterm "${RUNNER_TEMP}/homebrew-voiceterm"
      - name: Update and publish formula
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAP_ROOT: ${{ runner.temp }}/homebrew-voiceterm
        run: |
          set -euo pipefail
          python3 scripts/release/update_homebrew.py \
            --version "${VERSION}" \
            --formula "${TAP_ROOT}/Formula/voiceterm.rb" \
            --readme "${TAP_ROOT}/README.md"
          cd "${TAP_ROOT}"
          if git diff --quiet; then
            echo "Homebrew tap already contains v${VERSION}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/voiceterm.rb README.md
          git commit -m "Update VoiceTerm to v${VERSION}"
          git push origin HEAD:main
