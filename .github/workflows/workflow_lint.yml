# Purpose: Lints workflow YAML with actionlint.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: workflow_lint

permissions:
  contents: read

concurrency:
  group: workflow-lint-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - develop
    paths:
      - ".github/workflows/*.yml"
  pull_request:
    paths:
      - ".github/workflows/*.yml"

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install actionlint
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Run actionlint
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/actionlint" -color -shellcheck=

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Run workflow shell hygiene guard
        run: python3 dev/scripts/checks/check_workflow_shell_hygiene.py

      - name: Run workflow action pinning guard
        run: python3 dev/scripts/checks/check_workflow_action_pinning.py
