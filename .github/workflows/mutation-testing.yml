# Purpose: Runs scheduled mutation tests, calculates score, and updates the badge.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: Mutation Testing

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutants:
    name: mutants shard ${{ matrix.shard.display }}/8
    runs-on: ubuntu-latest
    timeout-minutes: 240
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        shard:
          - { index: 0, display: 1 }
          - { index: 1, display: 2 }
          - { index: 2, display: 3 }
          - { index: 3, display: 4 }
          - { index: 4, display: 5 }
          - { index: 5, display: 6 }
          - { index: 6, display: 7 }
          - { index: 7, display: 8 }

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Install ALSA development headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation tests (sharded)
        run: |
          # intentional: error suppression for capturing cargo-mutants exit code
          set +e
          cargo mutants \
            --baseline skip \
            --timeout 180 \
            --shard ${{ matrix.shard.index }}/8 \
            -o mutants.out \
            --json
          status=$?
          set -e
          # cargo-mutants uses exit code 2 when some mutants survive.
          # Keep shard jobs alive so outcomes upload and aggregate scoring
          # can always publish advisory threshold reporting.
          if [ "${status}" -ne 0 ] && [ "${status}" -ne 2 ] && [ "${status}" -ne 3 ]; then
            exit "${status}"
          fi

      - name: Locate shard outcomes
        run: |
          set -euo pipefail
          OUTCOME_PATH="$(python3 ../dev/scripts/workflow_bridge/shell.py find-first-file --search-root mutants.out --pattern outcomes.json)"
          if [ -z "${OUTCOME_PATH}" ]; then
            echo "outcomes.json not found" >&2
            exit 1
          fi
          cp "${OUTCOME_PATH}" "mutants.out/shard-${{ matrix.shard.display }}-outcomes.json"
          echo "Captured ${OUTCOME_PATH}"

      - name: Report shard mutation score
        run: python3 ../dev/scripts/checks/check_mutation_score.py --path mutants.out/shard-${{ matrix.shard.display }}-outcomes.json --threshold 0.0

      - name: Upload shard outcomes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mutation-outcomes-shard-${{ matrix.shard.display }}
          path: rust/mutants.out/shard-${{ matrix.shard.display }}-outcomes.json
          if-no-files-found: error

  mutation-score:
    name: report aggregated mutation score (advisory)
    runs-on: ubuntu-latest
    if: always()
    needs: mutants
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download shard outcomes
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: mutation-outcomes-shard-*
          path: mutation-shards
          merge-multiple: true

      - name: Render mutation score badge
        if: always()
        run: python3 dev/scripts/badges/mutation.py --glob "mutation-shards/**/shard-*-outcomes.json" --output .github/badges/mutation-score.json

      - name: Commit mutation badge update
        if: always() && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/badges/mutation-score.json; then
            echo "No mutation badge change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/mutation-score.json
          git commit -m "chore: update mutation score badge"
          # intentional: error suppression for rebase race with concurrent badge updates
          git pull --rebase origin master || true
          # intentional: error suppression for non-fast-forward push race
          git push || {
            echo "Non-fast-forward on badge push; leaving workflow green."
            exit 0
          }

      - name: Report mutation score threshold status (advisory)
        if: always()
        run: |
          set -euo pipefail
          python3 dev/scripts/checks/check_mutation_score.py \
            --glob "mutation-shards/**/shard-*-outcomes.json" \
            --threshold 0.80 \
            --report-only
          echo "::notice::Mutation score is tracked as advisory signal (non-blocking) for release flow."
