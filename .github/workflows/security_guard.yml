name: Security

on:
  push:
    paths:
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - "rust/deny.toml"
      - "pypi/**"
      - ".github/workflows/security_guard.yml"
  pull_request:
    paths:
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - "rust/deny.toml"
      - "pypi/**"
      - ".github/workflows/security_guard.yml"
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Install dependency scanners
        run: cargo install cargo-audit cargo-deny --locked
      - name: Cargo audit
        run: cargo audit
      - name: Cargo deny
        run: cargo deny check

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: github/codeql-action/init@08d09a53f0f5d694f253bd25732e4429c9e9337f
        with:
          languages: python
      - uses: github/codeql-action/analyze@08d09a53f0f5d694f253bd25732e4429c9e9337f
