# Purpose: Runs pre-commit hooks on Python and config files to catch formatting/lint issues early.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: Pre-commit

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - develop
    paths:
      - "dev/scripts/**/*.py"
      - "app/**/*.py"
      - "*.yaml"
      - "*.yml"
      - ".github/workflows/*.yml"
      - ".pre-commit-config.yaml"
  pull_request:
    paths:
      - "dev/scripts/**/*.py"
      - "app/**/*.py"
      - "*.yaml"
      - "*.yml"
      - ".github/workflows/*.yml"
      - ".pre-commit-config.yaml"

jobs:
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Resolve commit range and changed files
        id: range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python3 dev/scripts/workflow_bridge/shell.py resolve-range \
            --event-name "${EVENT_NAME}" \
            --push-before "${PUSH_BEFORE}" \
            --push-head "${PUSH_HEAD}" \
            --pr-base "${PR_BASE}" \
            --pr-head "${PR_HEAD}" \
            --changed-files-output /tmp/pre-commit-changed-files.txt \
            --github-output "${GITHUB_OUTPUT}"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        env:
          SKIP: no-commit-to-branch
        run: |
          set -euo pipefail
          mapfile -t changed_files < <(
            while IFS= read -r path; do
              [[ -n "${path}" && -e "${path}" ]] && printf '%s\n' "${path}"
            done < /tmp/pre-commit-changed-files.txt
          )
          if [[ ${#changed_files[@]} -eq 0 ]]; then
            echo "No existing changed files matched this pre-commit run."
            exit 0
          fi
          printf 'Running pre-commit on %s files\n' "${#changed_files[@]}"
          pre-commit run --files "${changed_files[@]}"
