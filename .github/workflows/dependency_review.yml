# Purpose: Checks dependency changes in PRs for known supply-chain risks.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: dependency_review

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "rust/Cargo.lock"
      - "rust/Cargo.toml"
      - "pypi/pyproject.toml"
      - ".github/dependabot.yml"
      - ".github/workflows/*.yml"

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Detect dependency graph availability
        id: dep_graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          STATUS="$(gh api repos/${{ github.repository }} --jq '.security_and_analysis.dependency_graph.status' 2>/tmp/dep-graph.err)"
          RC=$?
          set -e
          if [[ "${RC}" -ne 0 || "${STATUS}" != "enabled" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Dependency graph is not enabled; skipping dependency review gate."
            if [[ -s /tmp/dep-graph.err ]]; then
              sed -n '1,5p' /tmp/dep-graph.err
            fi
            exit 0
          fi
          echo "enabled=true" >> "${GITHUB_OUTPUT}"

      - name: Dependency Review
        if: steps.dep_graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803
        with:
          fail-on-severity: high
