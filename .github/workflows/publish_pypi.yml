name: Publish PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Verify release tag and version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          git fetch --no-tags origin master
          git merge-base --is-ancestor "${TAG}" FETCH_HEAD
          python3 scripts/release/check_version.py --expected "${VERSION}"
      - name: Build and validate distributions
        run: |
          python3 -m pip install --upgrade build twine
          python3 -m build pypi
          python3 -m twine check pypi/dist/*
      - name: Publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python3 -m twine upload pypi/dist/*
      - name: Verify PyPI
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          for _ in $(seq 1 12); do
            if curl -fsSL "https://pypi.org/pypi/voiceterm/json" | \
              python3 -c 'import json,sys; expected=sys.argv[1]; data=json.load(sys.stdin); raise SystemExit(0 if data["info"]["version"] == expected else 1)' "${VERSION}"; then
              exit 0
            fi
            sleep 10
          done
          echo "PyPI did not report ${VERSION} in time" >&2
          exit 1
