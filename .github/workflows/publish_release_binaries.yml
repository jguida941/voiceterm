name: Publish release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    name: ${{ matrix.package_os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            package_os: linux
            arch: amd64
          - runner: macos-15-intel
            package_os: darwin
            arch: amd64
          - runner: macos-14
            package_os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
      - name: Verify release tag and version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          git fetch origin master --tags
          git merge-base --is-ancestor "${TAG}" origin/master
          python3 scripts/release/check_version.py --expected "${VERSION}"
      - name: Install Linux audio headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        env:
          LIBCLANG_PATH: ${{ runner.os == 'macOS' && '/Library/Developer/CommandLineTools/usr/lib' || '' }}
        run: cargo build --release --manifest-path rust/Cargo.toml --bin voiceterm
      - name: Package
        id: package
        env:
          TAG: ${{ github.event.release.tag_name }}
          PACKAGE_OS: ${{ matrix.package_os }}
          PACKAGE_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ARCHIVE="voiceterm-${VERSION}-${PACKAGE_OS}-${PACKAGE_ARCH}.tar.gz"
          tar -czf "${ARCHIVE}" -C rust/target/release voiceterm
          python3 scripts/release/sha256.py --input "${ARCHIVE}"
          echo "archive=${ARCHIVE}" >> "${GITHUB_OUTPUT}"
          echo "checksum=${ARCHIVE}.sha256" >> "${GITHUB_OUTPUT}"
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        run: gh release upload "${TAG}" "${ARCHIVE}" "${CHECKSUM}" --clobber
