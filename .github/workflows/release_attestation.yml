name: Release provenance

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  attest:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Build source archive
        id: archive
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          git fetch origin master --tags
          git merge-base --is-ancestor "${TAG}" origin/master
          ARCHIVE="voiceterm-${VERSION}-source.tar.gz"
          git archive --format=tar.gz --prefix="voiceterm-${VERSION}/" -o "${ARCHIVE}" "${TAG}"
          python3 scripts/release/sha256.py --input "${ARCHIVE}"
          echo "archive=${ARCHIVE}" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-source-${{ github.event.release.tag_name }}
          path: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.archive }}.sha256
      - uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f
        with:
          subject-path: ${{ steps.archive.outputs.archive }}
