# Purpose: Runs core Rust CI checks (fmt, clippy, tests) and updates the CI badge.
# Details: See .github/workflows/README.md for triggers, jobs, and failure handling.
name: Rust TUI CI

permissions:
  contents: read

on:
  push:
    paths:
      - "rust/src/**"
      - ".github/workflows/rust_ci.yml"
  pull_request:
    paths:
      - "rust/src/**"
      - ".github/workflows/rust_ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Install ALSA development headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features -- --nocapture

      - name: cargo doc
        run: cargo doc --workspace --no-deps --all-features

  rust-msrv:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: "1.85.0"

      - name: Install ALSA development headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: cargo check (MSRV)
        run: cargo check --workspace --all-features

  rust-feature-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature_mode:
          - name: default-features
            args: "--workspace"
          - name: no-default-features
            args: "--workspace --no-default-features"

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Install ALSA development headers
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: cargo check (${{ matrix.feature_mode.name }})
        run: cargo check ${{ matrix.feature_mode.args }}

  rust-macos-runtime:
    runs-on: macos-14

    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: cargo test runtime smoke
        run: cargo test --bin voiceterm -- --nocapture

  ci-badge:
    name: aggregate ci badge
    if: always()
    needs:
      - rust
      - rust-msrv
      - rust-feature-matrix
      - rust-macos-runtime
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Resolve aggregate CI status
        id: aggregate
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          MSRV_RESULT: ${{ needs['rust-msrv'].result }}
          FEATURE_MATRIX_RESULT: ${{ needs['rust-feature-matrix'].result }}
          MACOS_RESULT: ${{ needs['rust-macos-runtime'].result }}
        run: |
          STATUS="success"
          for RESULT in "${RUST_RESULT}" "${MSRV_RESULT}" "${FEATURE_MATRIX_RESULT}" "${MACOS_RESULT}"; do
            if [[ "${RESULT}" != "success" ]]; then
              STATUS="failure"
              break
            fi
          done
          echo "status=${STATUS}" >> "${GITHUB_OUTPUT}"

      - name: Render CI badge
        run: python3 dev/scripts/render_ci_badge.py --status "${{ steps.aggregate.outputs.status }}" --output .github/badges/ci-status.json

      - name: Commit CI badge update
        if: github.ref == 'refs/heads/master'
        run: |
          if git diff --quiet -- .github/badges/ci-status.json; then
            echo "No CI badge change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/ci-status.json
          git commit -m "chore: update CI badge"
          git push
