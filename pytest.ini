[pytest]
addopts = --tb=short -x
testpaths =
    app/operator_console/tests
    dev/scripts/devctl/tests
norecursedirs =
    .git
    .mypy_cache
    .pytest_cache
    .ruff_cache
    .venv
    integrations
    pypi
    repo_example_temp
markers =
    slow: intentional long-running test; still subject to repo session timeout
