# mypy configuration for codex-voice Python code.
#
# Ratchet plan:
#   Phase 1 (current) - Non-blocking baseline plus strict typestate seed.
#   Phase 2           - Enable check_untyped_defs, fix violations.
#   Phase 3           - Expand strict=True module by module.
#   Phase 4           - Make blocking in CI (remove continue-on-error).

[mypy]
python_version = 3.11
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False
warn_return_any = False
warn_unreachable = True
show_error_codes = True
pretty = True

# Exclude test files from initial analysis to reduce noise
exclude = (?x)(
    /tests/
    | /test_
  )

# --- Stricter overrides for newer, well-typed modules ---

[mypy-app.operator_console.collaboration.*]
check_untyped_defs = True
warn_return_any = True

[mypy-app.operator_console.layout.*]
check_untyped_defs = True
warn_return_any = True

[mypy-app.operator_console.workflows.*]
check_untyped_defs = True
warn_return_any = True

[mypy-dev.scripts.devctl.tests.runtime.test_typestate_exhaustiveness]
strict = True
warn_unreachable = True

[mypy-dev.scripts.devctl.context_graph.models]
strict = True
warn_unreachable = True

[mypy-dev.scripts.devctl.runtime.governed_transitions]
strict = True
warn_unreachable = True

[mypy-dev.scripts.devctl.runtime.receipt_state_gate]
strict = True
warn_unreachable = True

[mypy-dev.scripts.devctl.runtime.bypass_lifecycle_evaluation]
strict = True
warn_unreachable = True

[mypy-dev.scripts.devctl.runtime.bypass_activation_result]
strict = True
warn_unreachable = True

[mypy-dev.scripts.devctl.runtime.task_complete_result]
strict = True
warn_unreachable = True

[mypy-dev.scripts.devctl.commands.vcs.governed_executor_push_result]
strict = True
warn_unreachable = True

[mypy-dev.scripts.devctl.commands.vcs.push_result_typestate]
strict = True
warn_unreachable = True
