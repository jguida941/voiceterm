# mypy configuration for codex-voice Python code.
#
# Ratchet plan:
#   Phase 1 (current) - Non-blocking, lenient defaults, track error count.
#   Phase 2           - Enable check_untyped_defs, fix violations.
#   Phase 3           - Enable disallow_untyped_defs for new modules.
#   Phase 4           - Make blocking in CI (remove continue-on-error).

[mypy]
python_version = 3.11
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False
warn_return_any = False
warn_unreachable = True
show_error_codes = True
pretty = True

# Exclude test files from initial analysis to reduce noise
exclude = (?x)(
    /tests/
    | /test_
  )

# --- Stricter overrides for newer, well-typed modules ---

[mypy-app.operator_console.collaboration.*]
check_untyped_defs = True
warn_return_any = True

[mypy-app.operator_console.layout.*]
check_untyped_defs = True
warn_return_any = True

[mypy-app.operator_console.workflows.*]
check_untyped_defs = True
warn_return_any = True
