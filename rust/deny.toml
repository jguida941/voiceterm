[graph]
all-features = true

[advisories]
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "transitive via ratatui/paste with no safe upgrade; tracked for replacement in active plans" },
]

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Zlib",
]
exceptions = [
  { allow = ["Unicode-3.0"], crate = "unicode-ident" },
  { allow = ["Unlicense"], crate = "whisper-rs" },
  { allow = ["Unlicense"], crate = "whisper-rs-sys" },
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "simplest-path"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
